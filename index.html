<!doctype html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta
      name="theme-color"
      content="#0a0a0e"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#f7f7f9"
      media="(prefers-color-scheme: light)"
    />
    <meta name="description" content="Pomo — a simple, refined Pomodoro focus timer & to-do list PWA." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pomo" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Pomo — Focus & To-Do</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem('pomo-theme') || 'system';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = saved === 'dark' || (saved === 'system' && prefersDark);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
